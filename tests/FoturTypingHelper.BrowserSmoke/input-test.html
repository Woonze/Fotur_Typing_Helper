<!doctype html>
<html lang="ru">
<meta charset="utf-8">
<title>FOTUR INPUT TEST</title>
<style>
  body { background:#080c0e; color:#f4f7f8; font:20px Segoe UI; display:grid; place-items:center; height:100vh; margin:0 }
  input { width:760px; padding:20px; border:2px solid #62fff7; border-radius:14px; background:#11181b; color:white; font-size:24px }
</style>
<input id="query" autofocus aria-label="Fotur autocorrection test">
<script>
  const input = document.querySelector('#query');
  input.addEventListener('input', () => document.title = `RESULT:${input.value}`);
  setTimeout(() => input.focus(), 250);
</script>
</html>
