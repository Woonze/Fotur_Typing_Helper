name: Windows build
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Test and publish
        shell: pwsh
        run: ./scripts/build-release.ps1 -SkipInstaller
      - uses: actions/upload-artifact@v4
        with:
          name: FoturTypingHelper-win-x64
          path: |
            artifacts/publish
            artifacts/*-portable.zip
